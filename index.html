<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI - Hosted Edition</title>
    <!-- Tailwind CSS لضمان مظهر احترافي وسريع -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons للأيقونات -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #0d1117; 
            color: #e6edf3;
            margin: 0;
            overflow: hidden;
        }
        .simulator-frame {
            border: 12px solid #21262d;
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: #000;
        }
        .code-editor {
            background: #010409;
            color: #7ee787;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
        }
        /* منع ظهور الصفحة بيضاء أثناء التحميل */
        #loader {
            position: fixed;
            inset: 0;
            background: #0d1117;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- شاشة التحميل الأولية -->
    <div id="loader">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500 mx-auto"></div>
            <p class="mt-4 text-indigo-400 text-sm">جاري تشغيل محرك نكسوس...</p>
        </div>
    </div>

    <!-- الشريط العلوي -->
    <header class="h-16 border-b border-[#30363d] bg-[#161b22] px-6 flex items-center justify-between shadow-md">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-600 rounded-lg">
                <i data-lucide="cpu" class="text-white w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-white font-bold text-sm tracking-wide">NEXUS <span class="text-indigo-400">PRO</span></h1>
                <p class="text-[9px] text-slate-500 uppercase">Deployed on GitHub</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="downloadCode()" class="flex items-center gap-2 bg-[#21262d] hover:bg-[#30363d] text-white px-4 py-1.5 rounded-full text-xs transition-all border border-[#30363d]">
                <i data-lucide="download" class="w-3.5 h-3.5"></i> تحميل الكود
            </button>
            <div class="h-6 w-[1px] bg-[#30363d]"></div>
            <span class="text-[10px] text-emerald-500 font-bold flex items-center gap-1">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                متصل
            </span>
        </div>
    </header>

    <!-- منطقة العمل -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden p-4 gap-4">
        
        <!-- المحرر -->
        <div class="flex-1 flex flex-col gap-4">
            <div class="bg-[#161b22] rounded-2xl border border-[#30363d] flex-1 flex flex-col overflow-hidden shadow-xl">
                <div class="px-4 py-2 bg-[#0d1117] border-b border-[#30363d] flex justify-between items-center">
                    <div class="flex items-center gap-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                        <i data-lucide="terminal" class="w-3 h-3"></i> index.html
                    </div>
                    <div class="flex gap-1">
                        <div class="w-2.5 h-2.5 rounded-full bg-red-500/20 border border-red-500/50"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/20 border border-yellow-500/50"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-emerald-500/20 border border-emerald-500/50"></div>
                    </div>
                </div>
                <textarea id="editor" class="flex-1 p-6 code-editor text-xs sm:text-sm focus:outline-none resize-none" spellcheck="false"></textarea>
            </div>
            
            <!-- لوحة التحكم السريعة -->
            <div class="bg-[#161b22] p-3 rounded-xl border border-[#30363d] flex items-center gap-4 overflow-x-auto no-scrollbar">
                <button onclick="applyTemplate('modern')" class="whitespace-nowrap flex items-center gap-2 px-3 py-1.5 bg-indigo-600/10 text-indigo-400 rounded-lg text-[10px] font-bold border border-indigo-600/20 hover:bg-indigo-600/20 transition-all">
                    <i data-lucide="layout" class="w-3.5 h-3.5"></i> قالب عصري
                </button>
                <button onclick="applyTemplate('landing')" class="whitespace-nowrap flex items-center gap-2 px-3 py-1.5 bg-emerald-600/10 text-emerald-400 rounded-lg text-[10px] font-bold border border-emerald-600/20 hover:bg-emerald-600/20 transition-all">
                    <i data-lucide="zap" class="w-3.5 h-3.5"></i> صفحة هبوط
                </button>
                <div class="h-4 w-[1px] bg-[#30363d]"></div>
                <p class="text-[9px] text-slate-500 italic">قم بتغيير الكود وسيتم تحديث المحاكي فوراً</p>
            </div>
        </div>

        <!-- المحاكي -->
        <div class="w-full lg:w-[360px] flex flex-col gap-4 shrink-0 items-center justify-center py-4 lg:py-0">
            <div class="simulator-frame w-[280px] sm:w-[320px] aspect-[9/18.5] relative overflow-hidden">
                <!-- Notch -->
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-20 h-5 bg-[#21262d] rounded-b-xl z-20"></div>
                <iframe id="preview" class="w-full h-full bg-white border-none" title="live-preview"></iframe>
            </div>
            <div class="flex items-center gap-2 text-[10px] font-bold text-slate-500 uppercase tracking-tighter">
                <i data-lucide="smartphone" class="w-3.5 h-3.5"></i> Nexus Live Simulator
            </div>
        </div>
    </main>

    <!-- التذييل -->
    <footer class="h-8 bg-[#010409] border-t border-[#30363d] px-6 flex items-center justify-between text-[9px] text-slate-500 font-mono uppercase tracking-widest">
        <div class="flex gap-4">
            <span>Server: GitHub Pages</span>
            <span>Uptime: 99.9%</span>
        </div>
        <div class="flex items-center gap-1">
            <i data-lucide="shield-check" class="w-3 h-3 text-emerald-500"></i> Secured by Nexus OS
        </div>
    </footer>

    <script>
        // تفعيل الأيقونات
        lucide.createIcons();

        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const loader = document.getElementById('loader');

        // الكود الابتدائي المستقر
        const initialTemplate = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f8fafc; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; color: #334155; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; width: 80%; }
        h1 { color: #4f46e5; font-size: 24px; margin-bottom: 10px; }
        p { font-size: 14px; line-height: 1.6; color: #64748b; }
        .btn { background: #4f46e5; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn:hover { transform: scale(1.05); background: #4338ca; }
    </style>
</head>
<body>
    <div class="card">
        <h1>أهلاً بك في تطبيقك! 🌐</h1>
        <p>هذه الصفحة تعمل الآن بنجاح على استضافة GitHub Pages بشكل دائم ومجاني.</p>
        <button class="btn" onclick="alert('تم بنجاح!')">اختبار التفاعل</button>
    </div>
</body>
</html>`;

        // قوالب جاهزة
        const templates = {
            modern: initialTemplate,
            landing: `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="https://cdn.tailwindcss.com"><\/script>
</head>
<body class="bg-slate-50 font-sans">
    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 text-center">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-6">
                <span class="text-white text-3xl font-bold">N</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 mb-2">قالب صفحة هبوط</h1>
            <p class="text-slate-500 text-sm mb-8">هذا تصميم سريع تم توليده عبر منصة نكسوس.</p>
            <button class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all">ابدأ الآن</button>
        </div>
    </div>
</body>
</html>`
        };

        function applyTemplate(type) {
            editor.value = templates[type];
            updatePreview();
        }

        function updatePreview() {
            const content = editor.value;
            preview.srcdoc = content;
        }

        function downloadCode() {
            const blob = new Blob([editor.value], { type: 'text/html' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            a.click();
        }

        // تهيئة المحرر
        editor.value = initialTemplate;
        editor.addEventListener('input', updatePreview);

        // إخفاء شاشة التحميل
        window.onload = () => {
            updatePreview();
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800);
        };
    </script>
</body>
</html>
